version: 1
servers:
  - name: review-metric
    version: 1.0.0
    description: 15-agent scientific peer review and manuscript analysis pipeline.
    run:
      command: uvx
      args:
        - reviewmetric-mcp
    env:
      REVIEWMETRIC_API_KEY:
        description: Your API key from the Review Metric web dashboard.
        required: true